name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            name: linux
          - runner: windows-latest
            name: windows
          - runner: macos-latest
            name: macos

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux system dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file pkg-config \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev libglib2.0-dev libgtk-3-dev

      - run: npm install

      - name: Build (Linux)
        if: matrix.name == 'linux'
        run: npm run tauri build -- --bundles deb,appimage

      - name: Build (Windows)
        if: matrix.name == 'windows'
        # MSI (WiX) fails on non-ASCII product names; NSIS handles Unicode correctly.
        run: npm run tauri build -- --bundles nsis

      - name: Build (macOS)
        if: matrix.name == 'macos'
        run: npm run tauri build -- --bundles dmg

      - name: Upload (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
